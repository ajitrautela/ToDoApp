<div class="container-fluid">
  <div class="display-3 m-2">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-list-check" viewBox="0 0 16 16">
      <path fill-rule="evenodd" d="M5 11.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5M3.854 2.146a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 1 1 .708-.708L2 3.293l1.146-1.147a.5.5 0 0 1 .708 0m0 4a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 1 1 .708-.708L2 7.293l1.146-1.147a.5.5 0 0 1 .708 0m0 4a.5.5 0 0 1 0 .708l-1.5 1.5a.5.5 0 0 1-.708 0l-.5-.5a.5.5 0 0 1 .708-.708l.146.147 1.146-1.147a.5.5 0 0 1 .708 0" />
    </svg>
  ToDo App Demo</div>
  <p *ngIf="!isLoading && todos.length === 0" class="m-2">No items yet.</p>

  <form *ngIf="!isLoading" (ngSubmit)="addTodoItem()">
    <input type="text"
           [(ngModel)]="newItemName"
           name="itemName"
           placeholder="Buy milk"
           class="form-control m-2" />
    <button type="submit" class="btn btn-primary m-2">Add New Item</button>
  </form>

  <div *ngIf="isLoading" class="spinner-border m-2">
    <span class="visually-hidden">Loading...</span>
  </div>
  <div *ngIf="error" class="alert alert-danger m-2">{{ error }}</div>

  <div *ngIf="!isLoading && todos.length > 0">
    <p class="display-6 m-2">To Do Items</p>
    <table class="table table-striped">
      <tbody>
        <tr *ngFor="let todo of todos">
          <td class="m-2" style="width:20px">
            <button (click)="deleteTodoItem(todo.id)" class="btn btn-sm btn-danger">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z" />
                <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z" />
              </svg>
            </button>
          </td>
          <td class="m-2">{{ todo.itemName }}</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
